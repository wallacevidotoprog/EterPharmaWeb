<div class="coolinput">
  <label [attr.for]="id" class="text">{{ label }}</label>
  <input
    [type]="type"
    [id]="id"
    placeholder="{{ ph }}"
    [readOnly]="!!isReadOnly"
    [(ngModel)]="value"
  />
  <button class="button"[ngStyle]="{'display' :isBtnVisible ?'block':'nome'}" type="button">{{btnString}}</button>
</div>
